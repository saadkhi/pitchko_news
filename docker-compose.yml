version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: pitchko_postgres
    environment:
      POSTGRES_DB: pitchko_news
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - pitchko_network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: pitchko_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - pitchko_network
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pitchko_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pitchko_news
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      NEWS_API_KEY: ${NEWS_API_KEY}
      GNEWS_API_KEY: ${GNEWS_API_KEY}
      HEYGEN_API_KEY: ${HEYGEN_API_KEY}
      SYNTHESIA_API_KEY: ${SYNTHESIA_API_KEY}
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    networks:
      - pitchko_network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pitchko_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - pitchko_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  pitchko_network:
    driver: bridge
